<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161618"/>
      <stop offset="100%" stop-color="#0c0c0e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    <clipPath id="rclip">
      <rect x="0" y="0" width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="510" height="510" rx="95" fill="none" stroke="#27272a" stroke-width="2"/>

  <!-- Glass highlight (top-left shine) -->
  <rect width="512" height="512" rx="96" fill="url(#glass)" clip-path="url(#rclip)"/>

  <!-- Screen body -->
  <rect x="88" y="100" width="336" height="228" rx="18" fill="#1c1c1f" stroke="#3f3f46" stroke-width="2.5"/>

  <!-- Screen inner (darker) -->
  <rect x="104" y="116" width="304" height="196" rx="10" fill="#0c0c0e"/>

  <!-- Play triangle -->
  <polygon points="232,185 232,248 284,216.5" fill="url(#accent)" opacity="0.9"/>

  <!-- Screen stand / neck -->
  <rect x="234" y="328" width="44" height="28" rx="4" fill="#27272a"/>

  <!-- Screen base -->
  <rect x="174" y="350" width="164" height="12" rx="6" fill="#27272a"/>

  <!-- Upscale arrow (rising from screen) -->
  <g transform="translate(340, 60)">
    <!-- Arrow shaft -->
    <rect x="7" y="20" width="6" height="60" rx="3" fill="url(#accent)"/>
    <!-- Arrow head -->
    <polygon points="10,0 0,22 6,22 6,24 14,24 14,22 20,22" fill="url(#accent)"/>
  </g>

  <!-- Resolution labels (subtle) -->
  <text x="120" y="300" font-family="Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#52525b">480p</text>
  <text x="120" y="300" font-family="Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#34d399" opacity="0.7" transform="translate(0,-30)">1080p</text>

  <!-- Corner accent dots -->
  <circle cx="394" cy="126" r="4" fill="#10b981" opacity="0.4"/>
  <circle cx="378" cy="126" r="4" fill="#10b981" opacity="0.25"/>
</svg>
