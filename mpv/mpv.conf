# AniUpscale mpv config — portable, loaded via --config-dir
# Edit this file to customize mpv behavior.

# ── Video output ────────────────────────────────────────────────────────────
vo=gpu
hwdec=auto
profile=gpu-hq
keep-open=yes

# ── Audio device persistence ────────────────────────────────────────────────
# Uncomment and set your preferred device name.
# Run: mpv --audio-device=help   to list available devices.
# Example:
# audio-device=wasapi/{xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx}
#
# mpv will use the system default until you uncomment a specific device.
# Once set here, it persists across every AniUpscale session.

# ── Volume ──────────────────────────────────────────────────────────────────
volume=100
volume-max=200

# ── Subtitles (sub mode) ────────────────────────────────────────────────────
sub-auto=fuzzy
sub-font-size=42
sub-color="#FFFFFF"
sub-border-color="#000000"
sub-border-size=2
sub-shadow-offset=1
sub-shadow-color="#33000000"

# ── Window ──────────────────────────────────────────────────────────────────
autofit-larger=90%x90%
force-window=immediate

# ── OSC ──────────────────────────────────────────────────────────────────────
osc=no

# ── OSD ─────────────────────────────────────────────────────────────────────
osd-bar=no
osd-level=1
osd-duration=2500
osd-font-size=32
