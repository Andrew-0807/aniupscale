# AniUpscale mpv keybindings — portable, loaded via --config-dir
# Edit this file to customize mpv shortcuts.
#
# Format:  key    command
# "ignore" removes a binding entirely.
#
# Run mpv with --input-test to see what keys mpv receives.

# ── Disable ALT+Numpad+/- (conflicts with system speaker volume) ────────────
# These default mpv bindings hijack your system volume hotkeys.
ALT+KP_ADD       ignore
ALT+KP_SUBTRACT  ignore

# ── Default overrides ───────────────────────────────────────────────────────
# Uncomment and modify below. Full reference:
# https://mpv.io/manual/master/#keyboard-control

# Screenshot
# s screenshot

# Seek
# LEFT seek -5
# RIGHT seek 5

# Volume (mpv internal, separate from system)
# UP add volume 2
# DOWN add volume -2

# Subtitles
# j cycle sub-visibility
# J cycle sub

# Playback speed
# [ multiply speed 0.9091
# ] multiply speed 1.1

# Aspect ratio
# a cycle-values video-aspect-override "16:9" "4:3" "2.35:1" "-1"

# Fullscreen
# f cycle fullscreen

# Quit
# q quit
# ESC quit
